{% load static %}<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EduTrack — Suivi de présence &amp; absences</title>

    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- React 18 + Babel (JSX compilé dans le navigateur, pas besoin de Node.js) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

    <!-- Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

    <!-- Design -->
    <link rel="stylesheet" href="{% static 'presences/style.css' %}">
    <link rel="icon" href="{% static 'presences/logo-cat.png' %}">
</head>
<body>
    <div id="root">
        <div class="chargement-initial">
            <div class="logo-pulse"></div>
            <p>Chargement d'EduTrack…</p>
        </div>
    </div>

    <!-- Logo accessible depuis le JSX -->
    <script>window.LOGO_URL = "{% static 'presences/logo-cat.png' %}";</script>

    <!-- Application React -->
    <script type="text/babel" data-presets="react" src="{% static 'presences/app.jsx' %}"></script>
</body>
</html>
